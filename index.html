<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Motor Health</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>PSC Motor Health AI Monitoring</h1>
    </div> 

    <div class="container">
        <div class="ai-box" id="ai-status-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <strong id="ai-suggestion" style="font-size: 1.2rem;">SYSTEM READY</strong>
                    <p id="ai-action-step" class="ai-subtext">Waiting for Cloud Sync...</p>
                </div>
                <div style="text-align: right;">
                    <button id="connect-btn" class="btn-connect" onclick="startMonitoring()">START LIVE SYNC</button>
                    <button id="disconnect-btn" class="clear-btn" onclick="stopMonitoring()" style="display:none; background:#ef4444;">PAUSE SYNC</button>
                </div>
            </div>

            <div class="stats-row">
                <span>Cloud Status: <b id="sync-status" style="color: #888;">Idle</b></span>
                <span>Motor Health: <b id="motor-health-score" style="color: #00ff88;">100%</b></span>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <div class="status-light" id="temp-light"></div>
                <div class="label">Motor Temperature</div>
                <div class="value" id="temp-display">0.0°C</div>
            </div>

            <div class="card">
                <div class="status-light" id="vib-light"></div>
                <div class="label">Vibration Intensity</div>
                <div class="value" id="vib-display">0.00G</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div class="log-box">
            <div class="log-header">
                <strong>SYSTEM LOGS</strong>
                <button class="clear-btn" onclick="clearHistory()" style="font-size: 0.7rem;">Clear</button>
            </div>
            <ul id="event-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
