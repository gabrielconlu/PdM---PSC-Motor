<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Motor Health AI Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* HEADER & 3D WIREFRAME */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            border-bottom: 1px solid #222;
        }

        .cube-viewport {
            width: 80px;
            height: 80px;
            perspective: 500px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(25deg);
        }

        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 1.5px solid #39ff14;
            background: rgba(57, 255, 20, 0.05);
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        }

        .front  { transform: translateZ(40px); }
        .back   { transform: rotateY(180deg) translateZ(40px); }
        .left   { transform: rotateY(-90deg) translateZ(40px); }
        .right  { transform: rotateY(90deg) translateZ(40px); }
        .top    { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        .cube-rotating { animation: rotateCube 10s infinite linear; }
        .cube-vibrate { animation: rotateCube 2s infinite linear, shake 0.1s infinite linear; border-color: #ff3131 !important; }

        @keyframes rotateCube { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(360deg); } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-2px, -2px); } }

        /* LOGS SECTION STYLING */
        .log-container {
            margin-top: 20px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        #system-logs {
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.6;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #444; padding-left: 8px; }
        .log-time { color: #555; margin-right: 10px; }
        .log-msg-error { color: #ff3131; }
        .log-msg-success { color: #39ff14; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="cube-viewport">
            <div id="motor-cube" class="cube">
                <div class="cube-face front"></div>
                <div class="cube-face back"></div>
                <div class="cube-face left"></div>
                <div class="cube-face right"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
            </div>
        </div>
        <div class="header-text">
            <h1 style="margin:0; font-size: 1.8rem; letter-spacing: 2px;">PSC Motor Health AI Monitoring</h1>
            <p style="margin:0; opacity: 0.5; font-size: 0.8rem;">IoT CLOUD RESEARCH EDITION</p>
        </div>
    </div>

    <div class="container">
        <div class="ai-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong id="ai-suggestion">SYSTEM READY</strong>
                    <p id="ai-action-step" class="ai-subtext">Waiting for Live Sync...</p>
                </div>
                <button id="connect-btn" class="btn-connect" onclick="startMonitoring()">START SYNC</button>
                <button id="disconnect-btn" class="clear-btn" onclick="stopMonitoring()" style="display:none;">PAUSE</button>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="card"><div id="temp-light" class="status-light"></div><div class="label">Temperature</div><div id="temp-display" class="value">0.0°C</div></div>
            <div class="card"><div id="vib-light" class="status-light"></div><div class="label">Vibration</div><div id="vib-display" class="value">0.00G</div></div>
        </div>

        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span style="font-weight: bold; font-size: 0.8rem; letter-spacing: 1px;">SYSTEM ACTIVITY LOGS</span>
                <button onclick="clearLogs()" style="background:none; border:none; color:#555; cursor:pointer; font-size:0.7rem;">CLEAR</button>
            </div>
            <div id="system-logs">
                <div class="log-entry"><span class="log-time">[17:25:01]</span> System initialized. Ready for Cloud link.</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Simple log function if not in your script.js
        function addLog(message, type = '') {
            const logBox = document.getElementById('system-logs');
            const now = new Date();
            const timeStr = `[${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}]`;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${timeStr}</span> <span class="log-msg-${type}">${message}</span>`;
            logBox.prepend(entry);
        }
        function clearLogs() { document.getElementById('system-logs').innerHTML = ''; }
    </script>
</body>
</html>
