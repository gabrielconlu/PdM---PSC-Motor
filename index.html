<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Motor Health Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PSC MOTOR MONITORING</h2>
            <div id="sync-status">Offline</div>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <div id="temp-light" class="status-light"></div>
                <div class="label">Temperature</div>
                <div class="value"><span id="temp-display">0.0</span><span class="unit">°C</span></div>
            </div>
            <div class="card">
                <div id="vib-light" class="status-light"></div>
                <div class="label">Vibration (G)</div>
                <div class="value"><span id="vib-display">0.96</span><span class="unit">G</span></div>
            </div>
        </div>

        <div class="ai-box">
            <div id="status-label" style="font-weight: bold; font-size: 1.1rem;">WAITING FOR DATA</div>
            <div class="ai-subtext" id="ai-action-step">Connect to start real-time monitoring of the PSC Motor.</div>
            <div class="stats-row">
                <span>Health Score: <b id="motor-health-score">--</b></span>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div class="log-box" id="system-logs">
            </div>

        <div class="nav-row">
            <button id="connect-btn" class="btn-connect" onclick="startMonitoring()">CONNECT</button>
            <button id="disconnect-btn" class="btn-connect" style="display:none; background: #475569;" onclick="stopMonitoring()">DISCONNECT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
